<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Add Project</title>

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="../css/global.css"
  >

  <link
    rel="stylesheet"
    href="../css/admin.css"
  >

</head>

<body>

  <!-- ADMIN -->
  <section class="admin-page">

    <div class="admin-form-card">

      <h1>
        Add Project
      </h1>

      <!-- FORM -->
      <form id="project-form">

        <!-- TITLE -->
        <input
          type="text"
          id="title"
          placeholder="Project Title"
          required
        >

        <!-- DESCRIPTION -->
        <textarea
          id="description"
          placeholder="Project Description"
          required
        ></textarea>

        <!-- TECH -->
        <input
          type="text"
          id="tech"
          placeholder="Tech Stack"
          required
        >

        <!-- GITHUB -->
        <input
          type="url"
          id="github"
          placeholder="GitHub Link"
        >

        <!-- LIVE -->
        <input
          type="url"
          id="live"
          placeholder="Live Website Link"
        >

        <!-- IMAGE -->
        <input
          type="file"
          id="image"
          accept="image/*"
          required
        >

        <!-- BUTTON -->
        <button type="submit">

          Upload Project

        </button>

      </form>

    </div>

  </section>

  <!-- SUPABASE -->
  <script src="../js/supabase.min.js"></script>

  <!-- JS -->
  <script src="../js/supabase.js"></script>
  <script src="../js/add-project.js"></script>

</body>
</html>
