<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Signup</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">

</head>

<body>

  <!-- AUTH -->
  <section class="auth-section">

    <div class="auth-card">

      <h1>
        Create Account
      </h1>

      <p>
        Signup to continue
      </p>

      <!-- FORM -->
      <form id="signup-form">

        <div class="input-group">

          <input
            type="email"
            id="signup-email"
            placeholder="Email"
            required
          >

        </div>

        <div class="input-group">

          <input
            type="password"
            id="signup-password"
            placeholder="Password"
            required
          >

        </div>

        <button
          type="submit"
          class="btn"
        >
          Signup
        </button>

      </form>

      <!-- LINK -->
      <div class="auth-link">

        Already have an account?

        <a href="login.html">
          Login
        </a>

      </div>

    </div>

  </section>

  
    <!-- JS -->

  <script type="module" src="js/firebase.js"></script>

  <script type="module" src="js/auth.js"></script>

  <!-- NAV AUTH -->
  <script type="module" src="js/navAuth.js"></script>
</body>
</html>
