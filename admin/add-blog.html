<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Upload Blog</title>

  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- ICONS -->
  <link rel="stylesheet" href="../css/fontawesome/all.min.css">

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="admin.css"
  >

  <style>
    body {
      font-family: 'Poppins', sans-serif !important;
    }
  </style>

  <!-- AUTH GUARD -->
  <script type="module" src="js/adminAuth.js"></script>
</head>

<body>

  <!-- BOX -->
  <div class="admin-box">

    <a href="dashboard.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>

    <!-- TITLE -->
    <h1>

      Upload Blog

    </h1>

    <!-- FORM -->
    <form id="blog-form">

      <!-- TITLE -->
      <input
        type="text"
        id="title"
        placeholder="Blog Title"
        required
      >

      <!-- CATEGORY -->
      <input
        type="text"
        id="category"
        placeholder="Category"
        required
      >

      <!-- IMAGE -->
      <label>

        Blog Image

      </label>

      <input
        type="file"
        id="image"
        required
      >

      <!-- DESCRIPTION -->
      <textarea
        id="description"
        placeholder="Short Description"
      ></textarea>

      <!-- CONTENT -->
      <textarea
        id="content"
        placeholder="Full Blog Content"
      ></textarea>

      <!-- BUTTONS -->
      <div class="btn-row">
        <button type="submit" id="btn-publish">Upload & Publish</button>
        <button type="button" id="btn-draft" class="btn-secondary">Save as Draft</button>
      </div>

    </form>

  </div>

  <!-- JS -->
  <script
    type="module"
    src="js/addBlog.js"
  ></script>

</body>
</html>
