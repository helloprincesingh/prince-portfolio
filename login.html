<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Login</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">

  <!-- FONT AWESOME -->
  <link
    rel="stylesheet"
    href="css/fontawesome/all.min.css"
  >

</head>

<body>

  <!-- AUTH -->
  <section class="auth-section">

    <div class="auth-card">

      <h1>
        Welcome Back
      </h1>

      <p>
        Login to continue
      </p>

      <!-- FORM -->
      <form id="login-form">

        <div class="input-group">

          <input
            type="email"
            id="login-email"
            placeholder="Email"
            required
          >

        </div>

        <div class="input-group">

          <input
            type="password"
            id="login-password"
            placeholder="Password"
            required
          >

        </div>
        <div class="forgot-password">

        <a href="#" id="forgot-password">
            Forgot Password?
        </a>

        </div>
        <button
          type="submit"
          class="btn"
        >
          Login
        </button>

      </form>

      <!-- GOOGLE -->
      <button
        id="google-login"
        class="google-btn"
      >

        <i class="fa-brands fa-google"></i>

        Continue with Google

      </button>

      <!-- LINK -->
      <div class="auth-link">

        Don't have an account?

        <a href="signup.html">
          Signup
        </a>

      </div>

    </div>

  </section>

 
    <!-- JS -->

  <script type="module" src="js/firebase.js"></script>

  <script type="module" src="js/auth.js"></script>

  <!-- NAV AUTH -->
  <script type="module" src="js/navAuth.js"></script>
</body>
</html>
