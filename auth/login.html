<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Prince Portfolio</title>

  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="auth-container">

    <h1>Login</h1>

    <form id="login-form">

      <div class="input-group">
        <input
          type="email"
          id="login-email"
          placeholder="Email"
          required
        >
      </div>

      <div class="input-group">
        <input
          type="password"
          id="login-password"
          placeholder="Password"
          required
        >
        <button type="button" id="login-password-toggle" class="password-toggle">👁</button>
      </div>

      <button class="auth-btn">
        Login
      </button>

    </form>

    <button
      id="google-login"
      class="google-btn"
    >
      Continue with Google
    </button>

    <div class="auth-links">
      <a href="forgot-password.html">
        Forgot Password?
      </a>

      <br><br>

      <a href="signup.html">
        Create New Account
      </a>
    </div>

  </div>

  <script type="module" src="login.js"></script>

</body>
</html>
