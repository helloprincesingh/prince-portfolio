  <link rel="stylesheet" href="css/global.css">

  <style>
    /* ── Blog Post Page ── */
    .post-hero {
      width: 100%;
      max-height: 480px;
      object-fit: cover;
      border-radius: 20px;
      margin-bottom: 36px;
      display: block;
    }

    .post-wrapper {
      max-width: 820px;
      margin: 120px auto 80px;
      padding: 0 24px;
    }

    .post-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #8b5cf6;
      font-weight: 500;
      text-decoration: none;
      margin-bottom: 32px;
      font-size: 15px;
      transition: gap 0.2s;
    }
    .post-back:hover { gap: 12px; }

    .post-category {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 30px;
      background: #7c3aed22;
      border: 1px solid #7c3aed44;
      color: #a78bfa;
      font-size: 13px;
      margin-bottom: 18px;
    }
    body.light .post-category { color: #7c3aed; }

    .post-title {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 20px;
    }

    .post-meta {
      display: flex;
      gap: 20px;
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }
    body.light .post-meta { color: #64748b; }

    .post-description {
      font-size: 18px;
      color: #cbd5e1;
      line-height: 1.9;
      margin-bottom: 36px;
      padding-bottom: 36px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-style: italic;
    }
    body.light .post-description { color: #475569; border-color: #e2e8f0; }

    .post-content {
      font-size: 16px;
      line-height: 2;
      color: #cbd5e1;
      white-space: pre-wrap;
      word-break: break-word;
    }
    body.light .post-content { color: #334155; }

    /* Loading / Error */
    .post-loading {
      text-align: center;
      padding: 100px 24px;
      color: #94a3b8;
    }
    .post-loading i { font-size: 2.5rem; }
    .post-loading p { margin-top: 16px; font-size: 16px; }

    .post-error {
      text-align: center;
      padding: 100px 24px;
      color: #f87171;
    }
  </style>
</head>

<body>
  <script>
    (function() {
      if (localStorage.getItem("theme") === "light") document.body.classList.add("light");
    })();
  </script>

  <!-- HEADER -->

      </nav>
      <div class="nav-right">
        <button id="theme-toggle" aria-label="Toggle Theme">
          <i class="fa-solid fa-moon"></i>

        <button id="menu-btn" aria-label="Toggle Menu">

  <!-- MAIN CONTENT (injected by JS) -->

    <div class="post-loading">
      <i class="fa-solid fa-spinner fa-spin"></i>
      <p>Loading post…</p>
    </div>
  </main>
