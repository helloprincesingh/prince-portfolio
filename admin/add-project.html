<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Add Project</title>

  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- ICONS -->
  <link rel="stylesheet" href="../css/fontawesome/all.min.css">

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="../css/global.css"
  >

  <link
    rel="stylesheet"
    href="../css/admin.css"
  >

  <style>
    body {
      font-family: 'Poppins', sans-serif !important;
    }
  </style>

  <!-- AUTH GUARD -->
  <script type="module" src="js/adminAuth.js"></script>
</head>

<body>

  <!-- ADMIN -->
  <section class="admin-page">

    <div class="admin-form-card">

      <a href="dashboard.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>

      <h1>
        Add Project
      </h1>

      <!-- FORM -->
      <form id="project-form">

        <!-- TITLE -->
        <input
          type="text"
          id="title"
          placeholder="Project Title"
          required
        >

        <!-- DESCRIPTION -->
        <textarea
          id="description"
          placeholder="Project Description"
          required
        ></textarea>

        <!-- TECH -->
        <input
          type="text"
          id="tech"
          placeholder="Tech Stack"
          required
        >

        <!-- GITHUB -->
        <input
          type="url"
          id="github"
          placeholder="GitHub Link"
        >

        <!-- LIVE -->
        <input
          type="url"
          id="live"
          placeholder="Live Website Link"
        >

        <!-- IMAGE -->
        <input
          type="file"
          id="image"
          accept="image/*"
          required
        >

        <!-- BUTTONS -->
        <div class="btn-row">
          <button type="submit" id="btn-publish">Upload & Publish</button>
          <button type="button" id="btn-draft" class="btn-secondary">Save as Draft</button>
        </div>

      </form>

    </div>

  </section>

  <!-- SUPABASE -->
  <script src="../js/supabase.min.js"></script>

  <!-- JS -->
  <script src="../js/supabase.js"></script>
  <script src="../js/add-project.js"></script>

</body>
</html>
